    #auth-screen {
      display: none; position: fixed; inset: 0; background: #1A1B1F;
      z-index: 9999; align-items: center; justify-content: center;
    }
    #auth-screen.show { display: flex; }
    .auth-box {
      background: #fff; border-radius: 14px; padding: 40px 44px;
      width: 100%; max-width: 360px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .auth-logo { font-size: 1.2rem; font-weight: 700; color: #1A1B1F; margin-bottom: 6px; }
    .auth-sub { font-size: 0.78rem; color: #6B6E7A; margin-bottom: 24px; }
    .auth-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #E4E4E8;
      border-radius: 8px; font-size: 1rem; font-family: inherit;
      text-align: center; letter-spacing: 0.2em; margin-bottom: 12px;
      outline: none; transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: #CF9F58; }
    .auth-btn {
      width: 100%; padding: 11px; background: #CF9F58; color: #1A1B1F;
      border: none; border-radius: 8px; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; font-family: inherit; letter-spacing: 0.04em;
      transition: background 0.15s;
    }
    .auth-btn:hover { background: #E8C07A; }
    .auth-error { font-size: 0.75rem; color: #DC2626; margin-top: 8px; min-height: 18px; }
  </style>
  <script>
    function checkAuth() {
      const PASS = '9025';
      const key = 'bln24_auth';
      if (sessionStorage.getItem(key) !== PASS) {
        document.getElementById('auth-screen').classList.add('show');
        document.getElementById('auth-input').focus();
      }
    }
    function submitAuth() {
      const PASS = '9025';
      const key = 'bln24_auth';
      const val = document.getElementById('auth-input').value;
      if (val === PASS) {
        sessionStorage.setItem(key, PASS);
        document.getElementById('auth-screen').classList.remove('show');
        loadAll();
      } else {
        document.getElementById('auth-error').textContent = 'Incorrect password. Try again.';
        document.getElementById('auth-input').value = '';
        document.getElementById('auth-input').focus();
      }
    }
    document.addEventListener('DOMContentLoaded', checkAuth);

  <style>
    :root {
      --black: #1A1B1F;
      --gold: #CF9F58;
      --gold-light: #E8C07A;
      --gold-pale: #FBF5EA;
      --blue: #0084D5;

      --grey: #6B6E7A;
      --grey-light: #F4F4F6;

    .header-right { display: flex; align-items: center; gap: 16px; }
    .last-updated { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
    .refresh-btn {
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: var(--gold-light); }

    /* MAIN */
    .container { padding: 32px 40px; max-width: 1440px; margin: 0 auto; }

    /* SECTION HEADER */

      display: flex; align-items: center; justify-content: space-between;

    .section-title {

    .source-pill.live { background: var(--green-light); color: var(--green); }
    .source-pill.live::before { content: "●"; font-size: 0.5rem; }
    .source-pill.analysis { background: var(--gold-pale); color: #92700A; }
    .source-pill.static { background: var(--grey-light); color: var(--grey); }

    /* KPI GRID */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .kpi-card {
      background: var(--white);
      border: 1px solid var(--grey-border);
      border-radius: 12px;
      padding: 20px 22px;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--grey-border);
      transition: background 0.15s;

    .kpi-card.gold::after { background: var(--gold); }

  </style>
</head>

<script>
const TOKEN = '366cfe729527d0007f68fa582b2f8c450295bd72';
const BASE = 'https://bln24.pipedrive.com/api/v1';
const STAGE_NAMES = {38:'Identified',39:'Qualified',42:'Capture/Pre-Proposal',138:'Proposal (RFP/RFQ)',195:'Post Proposal'};
const STAGE_ORDER = [38,39,42,138,195];
let ALL = [];

function fmt(n) {
  if (!n) return '$0';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toLocaleString();
}

function probBadge(p) {
  if (p >= 70) return `<span class="badge badge-green">${p}%</span>`;
  if (p >= 40) return `<span class="badge badge-yellow">${p}%</span>`;
  if (p > 0)  return `<span class="badge badge-red">${p}%</span>`;
  return `<span class="badge badge-grey">${p}%</span>`;
}

function daysSince(d) { return d ? Math.floor((new Date()-new Date(d))/86400000) : null; }

function openModal(eyebrow, title, sub, body, source) {
  document.getElementById('modalEyebrow').textContent = eyebrow || '';
  document.getElementById('modalTitle').textContent = title || '';
  document.getElementById('modalSub').textContent = sub || '';
  document.getElementById('modalBody').innerHTML = body || '';
  document.getElementById('modalSource').innerHTML = '📡 ' + (source || 'Pipedrive CRM · pulled at ' + new Date().toLocaleTimeString());
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeBg(e) { if (e.target===document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function dealDetail(d) {
  const days = daysSince(d.last_activity_date);
  const stage = STAGE_NAMES[d.stage_id] || '?';
  return `
    <div class="detail-grid">
      <div class="detail-field"><div class="detail-label">Agency</div><div class="detail-value">${d.org_name||'—'}</div></div>
      <div class="detail-field"><div class="detail-label">Stage</div><div class="detail-value">${stage}</div></div>
      <div class="detail-field"><div class="detail-label">Total Value</div><div class="detail-value gold">${fmt(d.value)}</div></div>
      <div class="detail-field"><div class="detail-label">Weighted Value</div><div class="detail-value">${fmt(d.weighted_value)}</div></div>
      <div class="detail-field"><div class="detail-label">Win Probability</div><div class="detail-value ${(d.probability||0)>=50?'green':(d.probability||0)>0?'':'red'}">${d.probability||0}%</div></div>
      <div class="detail-field"><div class="detail-label">Owner</div><div class="detail-value">${d.owner_name||'—'}</div></div>
      <div class="detail-field"><div class="detail-label">Last Activity</div><div class="detail-value ${days>180||days===null?'red':''}">${d.last_activity_date||'Never'}${days!==null?' ('+days+' days ago)':''}</div></div>
      <div class="detail-field"><div class="detail-label">Next Activity</div><div class="detail-value ${!d.next_activity_date?'red':''}">${d.next_activity_date||'⚠ None scheduled'}</div></div>
      <div class="detail-field"><div class="detail-label">Expected Close</div><div class="detail-value">${d.expected_close_date||'—'}</div></div>
      <div class="detail-field"><div class="detail-label">Pipedrive ID</div><div class="detail-value">#${d.id}</div></div>
    </div>
    <button class="toggle-raw" onclick="toggleRaw(this,'raw-${d.id}')">Show raw data ↓</button>
    <div class="raw-data" id="raw-${d.id}">${JSON.stringify(d,null,2)}</div>`;
}

function toggleRaw(btn, id) {
  const el = document.getElementById(id);
  if(el.style.display==='none'||!el.style.display) { el.style.display='block'; btn.textContent='Hide raw data ↑'; }
  else { el.style.display='none'; btn.textContent='Show raw data ↓'; }
}

function showDeal(d) {
  openModal('Deal Detail · Pipedrive', d.title, d.org_name, dealDetail(d), `Pipedrive CRM · Deal #${d.id} · Live at ${new Date().toLocaleTimeString()}`);
}

function dealsTable(deals, cols) {
  if(!deals.length) return '<div class="loading">No deals found.</div>';
  return `<table><thead><tr>${cols.map(c=>`<th>${c.h}</th>`).join('')}</tr></thead><tbody>${
    deals.map(d=>`<tr class="clickable" onclick="showDeal(window._dm[${d.id}])">${cols.map(c=>`<td>${c.r(d)}</td>`).join('')}</tr>`).join('')
  }</tbody></table>`;
}

  const s=[...ALL].sort((a,b)=>(b.value||0)-(a.value||0));
  openModal('All Open Deals','Pipeline Overview',`${s.length} deals · ${fmt(s.reduce((t,d)=>t+(d.value||0),0))} total · Click any row for detail`,
    dealsTable(s,[
      {h:'Opportunity',r:d=>`<div class="td-primary">${(d.title||'').substring(0,48)}${d.title?.length>48?'…':''}</div><div class="td-secondary">${d.org_name||''}</div>`},
      {h:'Value',r:d=>`<span class="td-value">${fmt(d.value)}</span>`},
      {h:'Stage',r:d=>`<span class="td-muted">${STAGE_NAMES[d.stage_id]||'?'}</span>`},
      {h:'Prob',r:d=>probBadge(d.probability||0)},

function showStage(sid) {
  const s=[...ALL].filter(d=>d.stage_id===sid).sort((a,b)=>(b.value||0)-(a.value||0));
  openModal('Stage Drill-Down',STAGE_NAMES[sid],`${s.length} deals · ${fmt(s.reduce((t,d)=>t+(d.value||0),0))} TCV · Click any row for detail`,
    dealsTable(s,[
      {h:'Opportunity',r:d=>`<div class="td-primary">${(d.title||'').substring(0,52)}${d.title?.length>52?'…':''}</div><div class="td-secondary">${d.org_name||''}</div>`},
      {h:'Value',r:d=>`<span class="td-value">${fmt(d.value)}</span>`},
      {h:'Prob',r:d=>probBadge(d.probability||0)},
      {h:'Owner',r:d=>`<span class="td-muted">${d.owner_name||'?'}</span>`},
      {h:'Next Activity',r:d=>d.next_activity_date||`<span style="color:var(--red);font-weight:600;font-size:0.72rem">None</span>`},
    ]));
}

function showLoss(r) {
  const item = LOSS_DATA.find(x=>x.r===r);
  if(!item) return;
  const body = `<div class="detail-grid">
    <div class="detail-field"><div class="detail-label">Deals Lost</div><div class="detail-value red">${item.c}</div></div>
    <div class="detail-field"><div class="detail-label">Total TCV Lost</div><div class="detail-value gold">${fmt(item.v)}</div></div>
  </div>
  <div style="margin:14px 0 8px;font-size:0.75rem;font-weight:700;color:var(--black)">Deals in this category:</div>
  <ul style="padding-left:18px;font-size:0.78rem;color:var(--grey);line-height:1.9">${item.deals.map(d=>`<li>${d}</li>`).join('')}</ul>

}

async function loadAll() {
  document.getElementById('lastUpdated').textContent = 'Refreshing...';
  try {
    const res = await fetch(`${BASE}/deals?api_token=${TOKEN}&status=open&limit=100`);
    const json = await res.json();
    ALL = json.data || [];
    window._dm = {};
    ALL.forEach(d=>window._dm[d.id]=d);

    const totalV = ALL.reduce((s,d)=>s+(d.value||0),0);
    const totalW = ALL.reduce((s,d)=>s+(d.weighted_value||0),0);
    const noAct = ALL.filter(d=>!d.next_activity_date);
    const highP = ALL.filter(d=>(d.probability||0)>=50);

    document.getElementById('kpi-pipeline').textContent = fmt(totalV);
    document.getElementById('kpi-deals').textContent = `${ALL.length} open deals`;
    document.getElementById('kpi-weighted').textContent = fmt(totalW);
    document.getElementById('kpi-highprob').textContent = highP.length;
    document.getElementById('kpi-highprob-val').textContent = fmt(highP.reduce((s,d)=>s+(d.value||0),0)) + ' in play';
    document.getElementById('kpi-noactivity').textContent = noAct.length;
    document.querySelectorAll('.pulse').forEach(el=>el.classList.remove('pulse'));

    // Stages
    const sd = {};
    STAGE_ORDER.forEach(id=>sd[id]={c:0,v:0,w:0});
    ALL.forEach(d=>{if(sd[d.stage_id]){sd[d.stage_id].c++;sd[d.stage_id].v+=d.value||0;sd[d.stage_id].w+=d.weighted_value||0;}});
    document.getElementById('stageCards').innerHTML = STAGE_ORDER.map(sid=>`
      <div class="stage-card" onclick="showStage(${sid})">
        <div class="stage-name">${STAGE_NAMES[sid]}</div>
        <div class="stage-count">${sd[sid].c}</div>
        <div class="stage-value">${fmt(sd[sid].v)}</div>
        <div class="stage-weighted">${fmt(sd[sid].w)} weighted</div>
      </div>`).join('');

    // Top deals
    const sorted = [...ALL].sort((a,b)=>(b.value||0)-(a.value||0));
    document.querySelector('#topDealsTable tbody').innerHTML = sorted.slice(0,10).map(d=>`
      <tr class="clickable" onclick="showDeal(window._dm[${d.id}])">
        <td><div class="td-primary">${(d.title||'').substring(0,44)}${d.title?.length>44?'…':''}</div><div class="td-secondary">${d.org_name||''}</div></td>
        <td><span class="td-value">${fmt(d.value)}</span></td>
        <td>${probBadge(d.probability||0)}</td>
        <td class="td-muted" style="${!d.next_activity_date?'color:var(--red);font-weight:600':''}">${d.next_activity_date||'None'}</td>
      </tr>`).join('');

    // No activity
    const nas = [...noAct].sort((a,b)=>(b.value||0)-(a.value||0));
    document.querySelector('#noActivityTable tbody').innerHTML = nas.slice(0,10).map(d=>{
      const days=daysSince(d.last_activity_date);
      return `<tr class="clickable${days===null||days>180?' alert-row':''}" onclick="showDeal(window._dm[${d.id}])">
        <td><div class="td-primary">${(d.title||'').substring(0,38)}${d.title?.length>38?'…':''}</div><div class="td-secondary">${d.org_name||''}</div></td>
        <td><span class="td-value">${fmt(d.value)}</span></td>
        <td class="${days>180||days===null?'warn-text':'td-muted'}">${d.last_activity_date||'Never'}${days!==null?' ('+days+'d)':''}</td>
      </tr>`;}).join('');

    // High prob
    const hps = [...highP].sort((a,b)=>(b.weighted_value||0)-(a.weighted_value||0));
    document.querySelector('#highProbTable tbody').innerHTML = hps.map(d=>`
      <tr class="clickable" onclick="showDeal(window._dm[${d.id}])">
        <td class="td-primary">${(d.title||'').substring(0,48)}${d.title?.length>48?'…':''}</td>
        <td class="td-muted">${(d.org_name||'').substring(0,28)}</td>
        <td><span class="td-value">${fmt(d.value)}</span></td>
        <td>${probBadge(d.probability||0)}</td>
        <td class="td-muted">${d.owner_name||'?'}</td>
        <td class="${!d.next_activity_date?'warn-text':'td-muted'}">${d.next_activity_date||'⚠ None'}</td>
      </tr>`).join('');

    // Recent
    const rec = ALL.filter(d=>(d.update_time||'')>'2026-01-01').sort((a,b)=>(b.update_time||'').localeCompare(a.update_time||''));
    document.querySelector('#recentTable tbody').innerHTML = rec.slice(0,12).map(d=>`
      <tr class="clickable" onclick="showDeal(window._dm[${d.id}])">
        <td class="td-muted">${(d.update_time||'').substring(0,10)}</td>
        <td class="td-primary">${(d.title||'').substring(0,52)}${d.title?.length>52?'…':''}</td>
        <td class="td-muted">${(d.org_name||'').substring(0,26)}</td>
        <td><span class="td-value">${fmt(d.value)}</span></td>
        <td class="td-muted">${d.owner_name||'?'}</td>
      </tr>`).join('');

    // Loss bars
    const maxC = Math.max(...LOSS_DATA.map(r=>r.c));
    document.getElementById('lossBars').innerHTML = LOSS_DATA.map(r=>`
      <div class="loss-bar-row" onclick="showLoss('${r.r.replace(/'/g,"\'")}')">
        <div class="loss-bar-label">${r.r}</div>
        <div class="loss-bar-track"><div class="loss-bar-fill" style="width:${(r.c/maxC*100).toFixed(0)}%"></div></div>
        <div class="loss-bar-count">${r.c} deals</div>
      </div>`).join('');

    // Win agencies
    document.getElementById('winAgencies').innerHTML = WIN_DATA.map(a=>`
      <div class="win-row" onclick="showWin('${a.n}')">
        <div class="win-row-name">${a.n}</div>
        <div class="win-row-stats">${a.w} win${a.w>1?'s':''} · ${fmt(a.v)}</div>
      </div>`).join('');

    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    console.error(e);
    document.getElementById('lastUpdated').textContent = 'Error — check console';
  }
}

loadAll();
setInterval(loadAll, 5*60*1000);
</script>
